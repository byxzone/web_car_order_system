<html>
	<head>
		<meta charset="utf-8">
		<title>登录</title>
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<link href="../css/mui.css" rel="stylesheet" />
		<script type="text/javascript" src="../js/md5.js"></script>
	</head>

	<body>
		<header class="mui-bar mui-bar-nav">
			<a class="mui-action-back mui-icon mui-icon-left-nav mui-pull-left"></a>
			<h1 class="mui-title">登录</h1>
		</header>
		<div class="mui-content" style="">
		<div class="mui-card">
			<img src='../img/chenxi_touming.fw.png'></img>
			</div>
		<script type="text/javascript">
			document.addEventListener('DOMContentLoaded', function() {
				document.getElementById("input_check").addEventListener('click', function() {
					var check = true;
					mui("#input_example input").each(function() {
						//若当前input为空，则alert提醒 
						if(!this.value || this.value.trim() == "") {
							var label = this.previousElementSibling;
							mui.alert(label.innerText + "不允许为空");
							check = false;
							return false;
						}
					}); //校验通过，继续执行业务逻辑 
					if(check){
						xmlhttp=new XMLHttpRequest();
						 xmlhttp.onreadystatechange=function(){
								if (xmlhttp.readyState==4 && xmlhttp.status==200){
									var temp=xmlhttp.responseText.search('ok');
									if(temp>0){
										mui.toast('登陆成功',{ duration:'long', type:'div' })
										var t=setTimeout("mui.openWindow('../index.php#self');",2000);
									}
									else mui.alert("用户名或密码错误");
								}
						}
						xmlhttp.open("POST","../api/login.php?",true);
						var $username=document.getElementById("username").value;
						var $password=document.getElementById("password").value;
						xmlhttp.setRequestHeader("Content-type","application/x-www-form-urlencoded");
						xmlhttp.send('username='+$username+'&password='+hex_md5($password));
					}
				})

			})
		</script>
		<script src="../js/mui.js"></script>
		<script type="text/javascript">
			mui.init()
		</script>
		<form class="mui-input-group">
  <div class="mui-card">
				<div class="mui-input-group" id="input_example">
					<div class="mui-input-row">
						<label>用户名：</label>
						<input type="text" id='username' class="mui-input-clear" id="col1" placeholder="请输入用户名" data-input-clear="18"><span class="mui-icon mui-icon-clear mui-hidden"></span>
					</div>
					<div class="mui-input-row">
						<label>密码：</label>
						<input type="password" id='password' class="mui-input-password" id="col2" placeholder="请输入密码" data-input-password="19"><span class="mui-icon mui-icon-eye"></span>
					</div>
					<div class="mui-button-row">
						<button type="button"  id="input_check" class="mui-btn mui-btn-primary" >登录</button>
						<button type="button" class="mui-btn mui-btn-danger" onclick="mui.alert('请联系学车管家进行重置!...');">忘记密码</button>
					</div>
				</div>
			</div>
</form>
</div>
	</body>

</html>
